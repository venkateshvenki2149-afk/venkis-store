<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venki's Store</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#111;
            color:white;
        }

        header{
            background:#1e1e1e;
            padding:20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:#00ffcc;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-size:18px;
        }

        .hero{
            text-align:center;
            padding:80px 20px;
        }

        .hero h1{
            font-size:50px;
            color:#00ffcc;
        }

        .hero p{
            margin-top:15px;
            font-size:20px;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            background:#00ffcc;
            color:black;
            padding:12px 25px;
            border-radius:10px;
            text-decoration:none;
            font-weight:bold;
        }

        .products{
            padding:50px;
            text-align:center;
        }

        .products h2{
            margin-bottom:30px;
        }

        .product-container{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .card{
            background:#222;
            width:250px;
            padding:20px;
            border-radius:15px;
        }

        .card img{
            width:100%;
            border-radius:10px;
        }

        .price{
            color:#00ffcc;
            font-size:22px;
            margin:10px 0;
        }

        footer{
            text-align:center;
            padding:20px;
            background:#1e1e1e;
            margin-top:40px;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">Venki's Store</div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h1>Welcome to Venki's Store</h1>
    <p>Gaming Mugs 🎮 | T-Shirts 👕 | Custom Merch 🔥</p>

    <a href="#" class="btn">Shop Now</a>
</section>

<section class="products">
    <h2>Featured Products</h2>

    <div class="product-container">

        <div class="card">
            <img src="https://via.placeholder.com/250"
            alt="Gaming Mug">

            <h3>Gaming Mug</h3>
            <p class="price">₹149</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250"
            alt="Gaming T-Shirt">

            <h3>Gaming T-Shirt</h3>
            <p class="price">₹699</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

    </div>
</section>

<footer>
    © 2026 Venki's Store | All Rights Reserved
</footer>

</body>
</html>
